name: 🐛 Bug Report
description: Please fill out the form to help us quickly locate issues on Android.
title: "[Bug] Brief description of the issue"
labels: ["bug"]
body:
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to Reproduce
      placeholder: |
        1. Open App → Tap XX button
        2. Open Settings → Tap XX button
        3. Crash / White screen / No response
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Result
      description: You can attach screenshots or screen recordings.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Result
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: App Version
      placeholder: e.g., v1.2.3 (check in Settings → About)
    validations:
      required: true

  - type: dropdown
    id: abi
    attributes:
      label: CPU Architecture / ABI
      options:
        - arm64-v8a
        - armeabi-v7a
        - Not sure
    validations:
      required: true

  - type: dropdown
    id: android
    attributes:
      label: Android OS Version
      options:
        - 15 or higher
        - 14
        - 13
        - 12
        - 11
        - 10
        - 9 or lower
    validations:
      required: true

  - type: input
    id: device
    attributes:
      label: Device Model
      placeholder: e.g., Xiaomi 13 / Samsung S23
    validations:
      required: true

  - type: textarea
    id: logcat
    attributes:
      label: Relevant Logs
      description: Please package and upload all app logs
      render: shell