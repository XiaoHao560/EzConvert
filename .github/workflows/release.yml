name: release
on:
 push:
   tags: [ 'v*' ]

jobs:
 build:
   runs-on: ubuntu-latest
   permissions:
     contents: write
   steps:
     - name: 检出代码
       uses: actions/checkout@v4
       with:
         fetch-depth: 0
         
     - name: 下载 FFmpegKit AAR
       env:
         REPO_TOKEN: ${{ secrets.REPO_READ_TOKEN }}
         FFMPEG_REPO: "XiaoHao560/ffmpeg-kit-next"
         FFMPEG_TAG: "v8.1.0"
       run: |
         mkdir -p libs
         echo "正在从 $FFMPEG_REPO 拉取 Release: $FFMPEG_TAG ..."
       
         API_URL="https://api.github.com/repos/$FFMPEG_REPO/releases/tags/$FFMPEG_TAG"
         DOWNLOAD_URL=$(curl -s -H "Authorization: token $REPO_TOKEN" $API_URL \
         | grep -o '"browser_download_url": *"[^"]*"' \
         | head -1 \
         | sed 's/"browser_download_url": *"//;s/"//')
         
         if [ -z "$DOWNLOAD_URL" ]; then
         echo "错误：未找到该 Tag 的 Release"
         exit 1
         fi
         
         curl -L -H "Authorization: token $REPO_TOKEN" -o ffmpeg-kit-next.zip "$DOWNLOAD_URL"
       
         unzip -q ffmpeg-kit-next.zip -d libs/
         
         echo "✅ FFmpeg AAR 已解压到 libs/，目录结构如下："
         find libs -type f -name "*.aar" | head -5
         ls -la libs/

     - name: 配置 JDK 17
       uses: actions/setup-java@v4
       with: 
         distribution: temurin
         java-version: 17
         
     - name: 初始化 Gradle
       uses: gradle/actions/setup-gradle@v4

     - name: 提取标签并查找更新日志
       id: changelog
       run: |
         TAG_NAME="${{ github.ref_name }}"
         echo "Current tag: $TAG_NAME"
         
         if [[ "$TAG_NAME" =~ ^(v[0-9]+)\. ]]; then
           MAJOR="${BASH_REMATCH[1]}"
           VERSION_DIR="${MAJOR}.0.0"
         else
           VERSION_DIR="v0.0.0"
         fi
         
         CHANGELOG_FILE="change_log/${VERSION_DIR}/${TAG_NAME}.md"
         echo "Looking for changelog file: $CHANGELOG_FILE"
         
         if [ -f "$CHANGELOG_FILE" ]; then
           echo "Changelog file found"
           echo "changelog_exists=true" >> $GITHUB_OUTPUT
           cat "$CHANGELOG_FILE" > release_body.md
         else
           echo "Warning: Changelog file $CHANGELOG_FILE not found"
           echo "changelog_exists=false" >> $GITHUB_OUTPUT
           echo "## $TAG_NAME" > release_body.md
           echo "" >> release_body.md
           echo "> 自动构建版本，详情请查看项目文档。" >> release_body.md
         fi

     - name: 判断构建变体
       id: variant
       run: |
         TAG_NAME="${{ github.ref_name }}"
         echo "Checking tag: $TAG_NAME"
         
         if [[ "$TAG_NAME" == *"-alpha"* ]] || \
            [[ "$TAG_NAME" == *"-beta"* ]] || \
            [[ "$TAG_NAME" == *"-rc"* ]] || \
            [[ "$TAG_NAME" == *"-debug"* ]] || \
            [[ "$TAG_NAME" =~ -alpha\.[0-9]+$ ]] || \
            [[ "$TAG_NAME" =~ -beta\.[0-9]+$ ]] || \
            [[ "$TAG_NAME" =~ -rc\.[0-9]+$ ]]; then
           echo "variant=release" >> $GITHUB_OUTPUT
           echo "is_prerelease=true" >> $GITHUB_OUTPUT
           echo "This is a pre-release version (using release build)"
         else
           echo "variant=release" >> $GITHUB_OUTPUT
           echo "is_prerelease=false" >> $GITHUB_OUTPUT
           echo "This is a release version"
         fi

     - name: Firebase 配置 (Release)
       env:
         GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
       run: |
         echo "$GOOGLE_SERVICES_JSON" > app/google-services.json

     - name: 解码签名密钥
       run: |
         echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > xiaohao-app-key.keystore
       shell: bash

     - name: 编译多 ABI APK
       run: ./gradlew assemble${{ steps.variant.outputs.variant }}
       env:
         GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4096m -XX:MaxMetaspaceSize=512m"
         KEYSTORE_FILE: ${{ github.workspace }}/xiaohao-app-key.keystore
         KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
         KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
         KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
         GITHUB_REF: ${{ github.ref }}

     - name: 检查 APK 生成情况
       run: |
         echo "检查生成的 APK 文件"
         find app/build/outputs/apk/${{ steps.variant.outputs.variant }} -name "*.apk" -type f | while read file; do
           echo "找到APK: $file"
           ls -lh "$file"
           unzip -l "$file" | grep "lib/" || echo "  无法读取ABI信息"
         done

     - name: 上传至 Github Release
       uses: softprops/action-gh-release@v2
       with:
         files: app/build/outputs/apk/${{ steps.variant.outputs.variant }}/*.apk
         tag_name: ${{ github.ref_name }}
         name: ${{ github.ref_name }}
         body_path: release_body.md
         prerelease: ${{ steps.variant.outputs.is_prerelease }}
         draft: false
