name: ci
on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main, dev, 'feat/**' ]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          
      - name: 下载 FFmpegKit AAR (gh)
        env:
          GITHUB_TOKEN: ${{ secrets.REPO_READ_TOKEN }}
        run: |
          mkdir -p libs
          gh release download v8.1.0 \
          --repo XiaoHao560/ffmpeg-kit-next \
          --pattern "*.zip" \
          --output ffmpeg-kit-next.zip
          unzip -q ffmpeg-kit-next.zip -d libs/
            
      - name: 缓存 Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            ~/.gradle/daemon
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-
            
      - name: 缓存 Android Build
        uses: actions/cache@v4
        with:
          path: |
            ~/.android/build-cache
            app/build
          key: android-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            android-${{ runner.os }}-

      - name: 配置 JDK 17
        uses: actions/setup-java@v4
        with: 
          distribution: temurin
          java-version: 17
          
      - name: 初始化 Gradle
        uses: gradle/actions/setup-gradle@v4
      
      - name: Firebase 配置 (Debug)
        env:
          GOOGLE_SERVICES_DEBUG_JSON: ${{ secrets.GOOGLE_SERVICES_DEBUG_JSON }}
        run: |
          mkdir -p app/src/debug
          echo "$GOOGLE_SERVICES_DEBUG_JSON" > app/src/debug/google-services.json
      
      - name: 解码签名密钥
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > xiaohao-app-key.keystore
      
      - name: 编译 Debug APK
        run: ./gradlew assembleDebug
        env:
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4096m -XX:MaxMetaspaceSize=512m"
          KEYSTORE_FILE: ${{ github.workspace }}/xiaohao-app-key.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          GITHUB_REF: ${{ github.ref }}
      
      - name: 上传 APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/*.apk
